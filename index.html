<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie-Go-Chain | מימון המונים מבוזר</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f0f2f5; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .badge-milestone { font-size: 0.9em; padding: 8px 12px; }
        /* עיצוב ייחודי לסטטוסים */
        .status-done { border-right: 4px solid #198754; background: #f0fff4; }
        .status-pending { border-right: 4px solid #ffc107; background: #fffdf0; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 p-3">
    <div class="container">
        <span class="navbar-brand h1 mb-0 fw-bold">🚀 Indie-Go-Chain</span>
        <div class="d-flex align-items-center gap-3">
            <span id="userBalance" class="text-white small"></span>
            <button id="connectBtn" class="btn btn-light rounded-pill fw-bold" onclick="connectWallet()">🦊 התחבר לארנק</button>
        </div>
    </div>
</nav>

<div class="container">
    
    <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active rounded-pill" id="pills-market-tab" data-bs-toggle="pill" data-bs-target="#pills-market">🛒 שוק הפרויקטים</button>
        </li>
        <li class="nav-item">
            <button class="nav-link rounded-pill" id="pills-create-tab" data-bs-toggle="pill" data-bs-target="#pills-create">🎨 צור פרויקט</button>
        </li>
        <li class="nav-item">
            <button class="nav-link rounded-pill" id="pills-admin-tab" data-bs-toggle="pill" data-bs-target="#pills-admin">🔧 ניהול (ליזמים)</button>
        </li>
    </ul>

    <div id="alertArea"></div>

    <div class="tab-content" id="pills-tabContent">
        
        <div class="tab-pane fade show active" id="pills-market">
            <div class="d-flex justify-content-between mb-3">
                <h4>פרויקטים חמים להשקעה</h4>
                <button class="btn btn-outline-secondary btn-sm" onclick="loadProjects()">🔄 רענן</button>
            </div>
            <div id="projectsGrid" class="row g-4"></div>
        </div>

        <div class="tab-pane fade" id="pills-create">
            <div class="card p-4 mx-auto" style="max-width: 600px;">
                <h4 class="mb-4 text-center">השקת קמפיין חדש (NFT)</h4>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">שם הפרויקט</label>
                    <input type="text" id="projTitle" class="form-control" placeholder="למשל: האלבום החדש של אריאל">
                </div>

                <div class="mb-3">
                    <label class="form-label">מחיר יעד (IndieTokens)</label>
                    <input type="number" id="newPrice" class="form-control" placeholder="1000">
                </div>
                <hr>
                <h6 class="text-muted mb-3">אבני דרך לשחרור כספים:</h6>
                <div class="mb-3">
                    <label class="form-label">אבן דרך 1 (30%)</label>
                    <input type="text" id="m1Desc" class="form-control" placeholder="למשל: סיום כתיבת שירים">
                </div>
                <div class="mb-3">
                    <label class="form-label">אבן דרך 2 (40%)</label>
                    <input type="text" id="m2Desc" class="form-control" placeholder="למשל: הקלטות באולפן">
                </div>
                <div class="mb-3">
                    <label class="form-label">אבן דרך 3 (30%)</label>
                    <input type="text" id="m3Desc" class="form-control" placeholder="למשל: הפצת האלבום">
                </div>
                <button class="btn btn-gradient w-100 py-2" onclick="createProject()">🚀 השק פרויקט</button>
            </div>
        </div>

        <div class="tab-pane fade" id="pills-admin">
            <h4>הפרויקטים שלי (ניהול)</h4>
            <div id="myProjectsList" class="row mt-3"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="projectModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold" id="modalTitle">שם הפרויקט</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                
                <h6 class="fw-bold mb-3">🚩 מצב אבני דרך (Milestones)</h6>
                <div id="modalMilestones" class="mb-4">
                    </div>

                <hr>

                <h6 class="fw-bold mb-3">📜 היסטוריית פעולות והעברות</h6>
                <div id="modalHistory" class="list-group list-group-flush" style="max-height: 200px; overflow-y: auto;">
                    </div>

            </div>
            <div class="modal-footer justify-content-between">
                <div id="modalPrice" class="fw-bold text-primary"></div>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
<script src="app.js"></script>
</body>
</html>
